name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
      - name: Login na Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build i push neoptimizovan image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:neoptimizovan

      - name: Build i push optimizovan image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.optimized
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:optimizovan

      - name: Skeniraj ranjivosti sa Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:optimizovan
          format: table
          exit-code: 0
